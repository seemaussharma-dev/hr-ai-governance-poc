name: Test HR AI Governance POC

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall -q .

      - name: Run automated tests
        run: python -m unittest discover -s ./tests -p "test_*.py" -v

      - name: Start Streamlit and verify application health
        run: |
          python -m streamlit run app.py \
            --server.headless true \
            --server.port 8501 \
            > streamlit.log 2>&1 &

          APP_PID=$!

          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8501/_stcore/health; then
              echo "Streamlit application started successfully."
              kill "$APP_PID"
              wait "$APP_PID" || true
              exit 0
            fi

            sleep 1
          done

          echo "Streamlit application did not become healthy."
          cat streamlit.log
          kill "$APP_PID" || true
          exit 1